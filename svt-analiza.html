<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Curba de sarcină | SVT Energy Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root{--g:#07943f;--navy:#071826;--muted:#64748b;--border:#dce5ef;--bg:#f8fafc}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--navy)}
    .shell{width:min(1120px,calc(100% - 40px));margin:0 auto;padding:28px 0 50px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
    .btn{height:44px;padding:0 18px;border-radius:11px;border:1px solid var(--border);background:#fff;color:var(--navy);font-weight:900;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    .btn.green{background:linear-gradient(135deg,#07943f,#05aa48);color:#fff;border:0}
    .card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:0 14px 40px rgba(15,23,42,.05)}
    .card h1{margin:0;color:var(--navy);font-size:30px;letter-spacing:-.05em}
    .card p{margin:8px 0 18px;color:var(--muted);font-size:13px;line-height:1.45}
    .chart{height:520px;position:relative}
    .empty{min-height:70vh;display:grid;place-items:center;text-align:center}
    @media(max-width:780px){.chart{height:360px}.shell{width:calc(100% - 24px)}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <a class="btn" href="./incarcare-curba-sarcina.html">← Încarcă alt fișier</a>
      <button class="btn green" onclick="window.print()">Salvează PDF</button>
    </div>

    <section class="card" id="content">
      <h1>Curba de sarcină</h1>
      <p id="metaText">Grafic generat din fișierul încărcat.</p>
      <div class="chart"><canvas id="loadChart"></canvas></div>
    </section>
  </main>

  <script>
    const dataset = JSON.parse(sessionStorage.getItem('svtDataset') || 'null');
    if (!dataset || !dataset.rows || !dataset.rows.length) {
      content.innerHTML = '<div class="empty"><div><h1>Nu există fișier încărcat</h1><p>Revino la pagina de upload și încarcă o curbă de sarcină.</p><p><a class="btn green" href="./incarcare-curba-sarcina.html">Încarcă fișier</a></p></div></div>';
    } else {
      const rows = dataset.rows || [];
      const step = Math.max(1, Math.ceil(rows.length / 320));
      const sampled = rows.filter((_, i) => i % step === 0);
      const hasPv = sampled.some(r => Number(r.pvKwh || 0) > 0);
      const hasThermal = sampled.some(r => Number(r.thermalKwh || 0) > 0);
      metaText.textContent = `${dataset.meta.fileName || '-'} · ${dataset.meta.sourceProfile || '-'} · ${dataset.meta.rowsCount || rows.length} intervale · ${dataset.meta.intervalMinutes || '-'} min`;

      const sets = [{
        label: 'Consum electric',
        data: sampled.map(r => Number(r.electricKwh || 0)),
        borderColor: '#07943f',
        backgroundColor: 'rgba(7,148,63,.12)',
        fill: true,
        tension: .28,
        pointRadius: 0,
        borderWidth: 2.4
      }];

      if (hasPv) {
        sets.push({
          label: 'Producție locală / PV',
          data: sampled.map(r => Number(r.pvKwh || 0)),
          borderColor: '#2563eb',
          backgroundColor: 'rgba(37,99,235,.08)',
          fill: false,
          tension: .28,
          pointRadius: 0,
          borderWidth: 2
        });
      }

      if (hasThermal) {
        sets.push({
          label: 'Consum termic',
          data: sampled.map(r => Number(r.thermalKwh || 0)),
          borderColor: '#f59e0b',
          backgroundColor: 'rgba(245,158,11,.08)',
          fill: false,
          tension: .28,
          pointRadius: 0,
          borderWidth: 2
        });
      }

      new Chart(loadChart, {
        type: 'line',
        data: { labels: sampled.map(r => r.localLabel || r.timestamp), datasets: sets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'bottom' },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${Number(ctx.parsed.y || 0).toLocaleString('ro-RO', {maximumFractionDigits: 2})} kWh`
              }
            }
          },
          scales: {
            x: { ticks: { maxTicksLimit: 12 } },
            y: { beginAtZero: true, title: { display: true, text: 'kWh / interval' } }
          }
        }
      });
    }
  </script>
</body>
</html>
